name: Wypchnij plan.ics

on:
  # Uruchamia się gdy wpychasz plik plan.ics (po lokalnym skrypcie)
  push:
    paths:
      - "plan.ics"

  # Możliwość ręcznego uruchomienia (np. do testów)
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 📂 Pobierz repo
        uses: actions/checkout@v4

      - name: 🔧 Skonfiguruj GitHub Pages
        uses: actions/configure-pages@v5

      - name: 📤 Wgraj artefakt
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: 🚀 Opublikuj na GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
